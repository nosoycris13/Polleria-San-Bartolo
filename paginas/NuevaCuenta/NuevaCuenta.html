<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../CSS/newcuenta.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <title>POLLERIA SAN BARTOLO</title>
</head>

<body>
    <header>
        <div class="logo">
            <img src="logotrasnparente.png" alt="Logo San Bartolo">
        </div>

        <nav class="subpaginas">
            <a href="../../index.html">INICIO</a> 
            <a href="../OrdeneAqui/OrdeneAqui.html">ORDENA AQUÍ</a> 
            <a href="../Locales/Locales.html">LOCALES</a> 
            <a href="../MisPedidos/MisPedidos.html">MIS PEDIDOS</a> 
            <a href="../Reservas/Reservas.html">RESERVAS</a> 

            <a href="../CarritoCompras/CarritoCompras.html">
                <img src="carrito.png" alt="Carrito" width="25">
            </a> 

            <a href="../MiCuenta/MiCuenta.html">
                <img src="persona.png" alt="persona" width="25">
            </a> 
        </nav>
    </header>

    <div class="banner">
        <img src="crearcuenta.png" alt="banner">
    </div>

    <br>
    <main>
        <form>
            <label class="subst">Nombres</label>
            <input type="text" required class="rellenar" placeholder="Escriba su nombre"> <br>
            <br>

            <label class="subst">Apellidos:</label>
            <input type="text" required class="rellenar" placeholder="Escriba su apellido"> <br>
            <br>

            <label class="subst">DNI:</label>
            <input type="number" placeholder="Ejm: 123456789"  required class="rellenar"> <br>
            <br>

            <label class="subst">País:</label>
            <select name="pais">
                <option value="">Seleccione su País</option>
                <option value="Perú">Perú</option>
                <option value="Venezuela">Venezuela</option>
                <option value="Chile">Chile</option>
                <option value="Argentina">Argentina</option>
            </select> 
        <br>
        <br>
            <label class="subst">Número de Teléfono:</label>
            <input type="number" placeholder="Ejm: 123 456 789" required class="rellenar"><br>
            <br>

            <label class="subst">Correo Electronico:</label>
            <input type="email" placeholder="Ejm:pepito@gmail.com" pattern="[a-z0-9]+@[a-z0-9]+\.[a-z]{2,3}$" required class="rellenar"/><br>
            <br>

            <label class="subst">Constraseña::</label>
            <input type="password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" required class="rellenar" placeholder="Contraseña"/><br>
            <ul>
                <li>
                    Mínimo 8 caracteres.
                </li>
                <li>
                    Al menos una letra mayúscula.
                </li>
                <li>
                    Al menos una letra minúscula.
                </li>
                <li>
                    Al menos un número.
                </li>
            </ul>

            <input type="submit" value="Enviar" class="enviar">
        </form>
    </main>

</body>
</html>
